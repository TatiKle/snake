<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Змейка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>ЗМЕЙКА</h1>

    <div class="scoreboard">
      <div class="score-block">
        <span class="label">СЧЁТ</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="score-block">
        <span class="label">РЕКОРД</span>
        <span class="value" id="best">0</span>
      </div>
    </div>

    <div class="difficulty">
      <span class="label">СКОРОСТЬ</span>
      <div class="diff-buttons">
        <button class="diff-btn active" data-speed="200">МЕДЛЕННО</button>
        <button class="diff-btn" data-speed="130">НОРМАЛЬНО</button>
        <button class="diff-btn" data-speed="70">БЫСТРО</button>
      </div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
      <button id="startBtn">СТАРТ</button>
      <button id="pauseBtn" disabled>ПАУЗА</button>
      <button id="restartBtn" disabled>ЗАНОВО</button>
    </div>

    <div class="instructions">
      УПРАВЛЕНИЕ: СТРЕЛКИ НА КЛАВИАТУРЕ
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
